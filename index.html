<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>スーパー記録くん - メディア記録アプリ</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
      margin: 0; 
      padding: 20px; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container { 
      background-color: #fff; 
      padding: 25px; 
      border-radius: 12px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
      max-width: 700px; 
      margin: auto;
    }
    h1 { 
      text-align: center; 
      margin-bottom: 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* モード切替タブ */
    .mode-tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 2px solid #e0e0e0;
    }
    .mode-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 16px;
      font-weight: 600;
      color: #666;
      transition: all 0.3s ease;
      position: relative;
    }
    .mode-tab.active {
      color: #667eea;
    }
    .mode-tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .mode-tab:hover:not(.active) {
      color: #333;
      background-color: #f5f5f5;
    }
    
    /* モードコンテンツ */
    .mode-content {
      display: none;
    }
    .mode-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* メディア要素 */
    .media-container { 
      position: relative; 
      background-color: #000; 
      margin-bottom: 20px; 
      border-radius: 8px;
      overflow: hidden;
    }
    video, audio { 
      width: 100%; 
      display: block; 
    }
    #audioVisualizer {
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      margin-bottom: 15px;
    }
    #drawingCanvas {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: crosshair;
